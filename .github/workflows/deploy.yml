name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            # Navigate to project directory
            cd /opt/vignan-university-mcp-server

            # Pull latest code from main
            git pull origin main

            # Install/update dependencies using the venv
            /opt/vignan-university-mcp-server/venv/bin/pip install -r requirements.txt

            # Kill the old process
            pkill -f "vignan_mcp_server.py" || true
            sleep 2

            # Restart the server using the venv python
            nohup /opt/vignan-university-mcp-server/venv/bin/python vignan_mcp_server.py > /tmp/vignan-mcp-server.log 2>&1 &
            sleep 3

            # Verify it's running
            if pgrep -f "vignan_mcp_server.py" > /dev/null; then
              echo "✅ Deployment complete! Server is running."
            else
              echo "❌ Server failed to start. Check /tmp/vignan-mcp-server.log"
              exit 1
            fi

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment succeeded"
          else
            echo "❌ Deployment failed — check the logs above"
          fi
